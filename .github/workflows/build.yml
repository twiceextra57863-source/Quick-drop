name: Build QuickChest Mod

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'  # microsoft ki jagah temurin use karo - more stable

      # Gradle wrapper jar manually download karo
      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          # Download official gradle wrapper jar
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.8.0/gradle/wrapper/gradle-wrapper.jar"
          echo "✅ Wrapper JAR downloaded"
          ls -lh gradle/wrapper/

      - name: Make gradlew Executable
        run: chmod +x gradlew

name: Build QuickChest Mod

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Make gradlew executable first
      - name: Make gradlew Executable
        run: chmod +x gradlew

      # Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Cache Fabric Loom
      - name: Cache Fabric Loom
        uses: actions/cache@v4
        with:
          path: |
            .gradle
            build/loom-cache
          key: ${{ runner.os }}-loom-${{ hashFiles('gradle.properties', 'build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-loom-

      # Build without hiding errors
      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace
        # Remove the | tail -100 so you see full errors

      # List files after build
      - name: List build output
        run: |
          echo "=== Build directory contents ==="
          ls -la build/libs/ 2>/dev/null || echo "build/libs not found"
          echo ""
          echo "=== Full build directory ==="
          ls -la build/ 2>/dev/null || echo "build directory not found"

      # Upload artifacts
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: quickchest-${{ github.run_number }}
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write  # Required for creating releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew Executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build Release JAR
        run: ./gradlew build --no-daemon

      - name: List built files
        run: ls -la build/libs/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          name: "QuickChest ${{ github.ref_name }}"
          body: |
            ## QuickChest Mod ${{ github.ref_name }}
            **Minecraft:** `1.21.4` | **Loader:** Fabric

            ### Installation
            1. **Fabric Loader** `0.16.9+` install karo
            2. **Fabric API** `0.110.0+1.21.4` install karo  
            3. JAR file `.minecraft/mods/` me daalo

            ### Features
            - Chest click = **Drop + Auto-store** in 0.3s
            - Escape menu me **Quick Chest ON/OFF** toggle
            - Config auto-save hoti hai
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
