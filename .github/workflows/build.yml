name: Build QuickChest Mod

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'  # microsoft ki jagah temurin use karo - more stable

      # Gradle wrapper jar manually download karo
      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          # Download official gradle wrapper jar
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.8.0/gradle/wrapper/gradle-wrapper.jar"
          echo "✅ Wrapper JAR downloaded"
          ls -lh gradle/wrapper/

      - name: Make gradlew Executable
        run: chmod +x gradlew

      # Gradle home cache
      - name: Cache Gradle Home
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/loom-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Fabric loom cache (ye important hai - Minecraft files cache karo)
      - name: Cache Fabric Loom
        uses: actions/cache@v4
        with:
          path: |
            .gradle
            build/loom-cache
          key: ${{ runner.os }}-loom-${{ hashFiles('**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-loom-

      - name: Build with Gradle
        run: |
          ./gradlew build --no-daemon --stacktrace --info 2>&1 | tail -100
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture Build Output
        if: always()
        run: |
          echo "=== Build directory contents ==="
          ls -lah build/libs/ 2>/dev/null || echo "build/libs not found"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: quickchest-${{ github.run_number }}
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
          if-no-files-found: error
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.8.0/gradle/wrapper/gradle-wrapper.jar"
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build Release JAR
        run: ./gradlew build --no-daemon

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            !build/libs/*-sources.jar
          name: "QuickChest ${{ github.ref_name }}"
          body: |
            ## QuickChest Mod ${{ github.ref_name }}
            **Minecraft:** `1.21.4` | **Loader:** Fabric

            ### Installation
            1. **Fabric Loader** `0.16.9+` install karo
            2. **Fabric API** `0.110.0+1.21.4` install karo  
            3. JAR file `.minecraft/mods/` me daalo

            ### Features
            - Chest click = **Drop + Auto-store** in 0.3s
            - Escape menu me **Quick Chest ON/OFF** toggle
            - Config auto-save hoti hai
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
