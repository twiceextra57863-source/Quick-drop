name: Build QuickChest Mod

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Gradlew generate karo agar missing hai
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      # Ab safely chmod karo
      - name: Grant Gradle Execute Permission
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "✅ gradlew found and made executable"
          else
            echo "⚠️ gradlew not found, using system gradle"
          fi

      # Gradlew ho toh use karo, nahi toh gradle directly
      - name: Build Mod
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew build --no-daemon
          else
            gradle build --no-daemon
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickchest-mod-jar
          path: build/libs/*.jar
          retention-days: 30

      - name: Build Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build successful!"
          else
            echo "❌ Build failed!"
          fi

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Grant Execute Permission
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          fi

      - name: Build for Release
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew build --no-daemon
          else
            gradle build --no-daemon
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          name: "QuickChest Mod ${{ github.ref_name }}"
          body: |
            ## QuickChest Mod ${{ github.ref_name }}
            ### Installation
            1. Install Fabric Loader 0.16.9+
            2. Install Fabric API 0.110.0+1.21.4
            3. Drop JAR in `.minecraft/mods/` folder
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
