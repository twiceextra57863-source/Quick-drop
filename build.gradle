plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT' apply false
}

// Or agar upar wala kaam na kare toh:
buildscript {
    repositories {
        maven {
            name = 'Fabric'
            url = 'https://maven.fabricmc.net/'
        }
        gradlePluginPortal()
    }
    dependencies {
        classpath 'net.fabricmc:fabric-loom:1.7-SNAPSHOT'
    }
}

apply plugin: 'fabric-loom'
