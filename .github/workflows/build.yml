name: Build Quick-drop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"
          
      - name: Build with Gradle 8.7
        run: gradle build
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TButtonMod
          path: build/libs/*.jar
