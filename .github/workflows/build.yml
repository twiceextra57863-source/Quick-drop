name: Build QuickChest Mod

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: List repository contents
        run: |
          echo "=== Repository Structure ==="
          ls -la
          echo ""
          echo "=== Gradle Wrapper ==="
          ls -la gradle/wrapper/ 2>/dev/null || echo "gradle/wrapper/ not found"
          echo ""
          echo "=== Build Files ==="
          ls -la *.gradle* 2>/dev/null || echo "No gradle files found"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Gradle Wrapper
        run: |
          # Check if gradlew exists
          if [ ! -f gradlew ]; then
            echo "gradlew not found! Creating..."
            gradle wrapper
          else
            echo "gradlew found"
          fi
          chmod +x gradlew
          
      - name: Check Gradle Version
        run: ./gradlew --version
        
      - name: Clean build first
        run: ./gradlew clean --no-daemon
        
      - name: Build with Gradle (Full Log)
        run: ./gradlew build --no-daemon --stacktrace --info
        # Full log dekho, kuch hide mat karo
        
      - name: Check build output
        run: |
          echo "=== Checking build/libs ==="
          if [ -d "build/libs" ]; then
            ls -la build/libs/
            echo "JAR files found:"
            find build/libs -name "*.jar"
          else
            echo "❌ build/libs directory does not exist!"
            echo ""
            echo "=== What's in build/ directory? ==="
            ls -la build/ 2>/dev/null || echo "build directory doesn't exist"
          fi
          
      - name: Upload JAR if exists
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: quickchest-${{ github.run_number }}
          path: build/libs/*.jar
          if-no-files-found: warn
          retention-days: 30
