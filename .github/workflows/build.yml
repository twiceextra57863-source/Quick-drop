name: Build QuickChest Mod

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Make gradlew executable
        run: chmod +x gradlew
        
      # COMPLETE CLEAN - Delete all caches
      - name: Clean everything
        run: |
          echo "Cleaning Gradle caches..."
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/wrapper/
          rm -rf .gradle/
          rm -rf build/
          echo "✅ All caches cleaned"
          
      - name: Build with Gradle
        run: |
          ./gradlew clean build --no-daemon --stacktrace --refresh-dependencies
          
      - name: List built files
        run: |
          echo "=== Build/libs contents ==="
          ls -la build/libs/ 2>/dev/null || echo "build/libs not found"
          echo ""
          echo "=== Full build directory ==="
          ls -la build/ 2>/dev/null || echo "build directory not found"
          
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: quickchest-${{ github.run_number }}
          path: build/libs/*.jar
          if-no-files-found: error
