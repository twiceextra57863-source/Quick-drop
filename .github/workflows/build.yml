name: Build QuickChest Mod

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Setup Gradle
        run: chmod +x gradlew
      
      # Use different cache key to avoid old cache
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v3-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-v3-
      
      # Clear only loom cache specifically
      - name: Clear Loom Cache
        run: |
          rm -rf ~/.gradle/caches/fabric-loom
          rm -rf .gradle/loom-cache
          ./gradlew --stop || true
      
      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon --stacktrace --refresh-dependencies
      
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: quickchest-mod
          path: build/libs/*.jar
