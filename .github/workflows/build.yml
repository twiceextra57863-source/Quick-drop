name: Build QuickChest Mod

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Clean Gradle Properties
        run: |
          # Remove any problematic JVM args
          if [ -f gradle.properties ]; then
            sed -i '' '/-Xdock/d' gradle.properties || true
          fi
          cat gradle.properties || echo "No gradle.properties"
      
      - name: Build
        run: |
          ./gradlew clean build --no-daemon --stacktrace
      
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: quickchest-${{ github.run_number }}
          path: build/libs/*.jar
