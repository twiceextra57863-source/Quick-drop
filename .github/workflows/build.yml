name: Build QuickChest Mod

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Manual trigger bhi kar sakte ho

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Repo checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Java 21 setup (1.21.4 needs Java 21)
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      # 3. Gradle cache (build fast hogi baar baar)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Gradle wrapper permission
      - name: Grant Gradle Execute Permission
        run: chmod +x gradlew

      # 5. Actual build
      - name: Build Mod with Gradle
        run: ./gradlew build --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6. Upload JAR as artifact (download kar sako GitHub se)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickchest-mod-jar
          path: build/libs/*.jar
          retention-days: 30

      # 7. Build success/fail status
      - name: Build Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ QuickChest Mod build successful!"
          else
            echo "❌ Build failed! Check logs above."
          fi

  # Optional: Auto release jab bhi tag push karo (v1.0.0 format)
  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build for Release
        run: ./gradlew build --no-daemon

      # GitHub Release create karega automatically
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          name: "QuickChest Mod ${{ github.ref_name }}"
          body: |
            ## QuickChest Mod ${{ github.ref_name }}
            
            ### Changes
            - Minecraft 1.21.4 Fabric Mod
            - Click chest = Instant drop + auto store in 0.3s
            - Toggle button in Escape menu
            
            ### Installation
            1. Install Fabric Loader 0.16.9+
            2. Install Fabric API 0.110.0+1.21.4
            3. Drop JAR in `.minecraft/mods/` folder
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
