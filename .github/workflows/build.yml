name: Build QuickChest Mod

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Wrapper jar download karo - gradlew script ki zaroorat nahi
      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.8.0/gradle/wrapper/gradle-wrapper.jar"

      - name: Make gradlew Executable
        run: chmod +x gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Build Mod
        run: ./gradlew build --no-daemon --stacktrace
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickchest-mod-${{ github.sha }}
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
          retention-days: 30

      - name: Print Build Result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ QuickChest build successful!"
            ls -lh build/libs/
          else
            echo "❌ Build failed! Check logs."
          fi

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.8.0/gradle/wrapper/gradle-wrapper.jar"

      - name: Make gradlew Executable
        run: chmod +x gradlew

      - name: Build for Release
        run: ./gradlew build --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            !build/libs/*-sources.jar
          name: "QuickChest Mod ${{ github.ref_name }}"
          body: |
            ## QuickChest Mod ${{ github.ref_name }}
            **Minecraft:** 1.21.4 Fabric
            
            ### Installation
            1. Install **Fabric Loader** `0.16.9+`
            2. Install **Fabric API** `0.110.0+1.21.4`
            3. Drop JAR into `.minecraft/mods/` folder
            
            ### Features
            - Chest pe click = instant drop + auto store in **0.3s**
            - Escape menu me **Quick Chest ON/OFF** toggle button
            - Config save hoti hai restart ke baad bhi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
