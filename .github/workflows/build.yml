name: Build QuickChest Mod

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Make gradlew executable
        run: chmod +x gradlew
        
      # Clear cache by using different cache key
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-v2-
            
      - name: Clean build (remove old artifacts)
        run: |
          ./gradlew clean
          rm -rf .gradle/loom-cache
          rm -rf build
          
      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace --refresh-dependencies
        
      - name: List built files
        run: |
          echo "=== Build/libs contents ==="
          ls -la build/libs/ 2>/dev/null || echo "build/libs not found"
          
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: quickchest-${{ github.run_number }}
          path: build/libs/*.jar
          if-no-files-found: error
